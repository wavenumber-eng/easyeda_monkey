name = "Release Signoff"
order = 99
description = "Final release signoff checks for versioning, Python hygiene, and design coverage"
enabled = true
concerns = ["release", "signoff"]

objectives = [
    "Package version metadata matches the release date contract",
    "Changelog mentions the release version",
    "Python signoff does not regress against the accepted baseline",
    "Ruff linting passes",
    "Pyright type checking passes",
    "Registered CLI commands have matching HTML design documentation",
    "Dataclasses and major interfaces have design docs and Rack test ownership",
]

[dependencies]
strata = ["L0_foundation"]
note = "L99 is enabled because the current signoff lane is lightweight."

[[subtests]]
id = "L99_001"
file = "test_L99_001_release_signoff.py"
name = "Release Signoff"
description = "Validate version contract and run py_signoff"
concerns = ["release", "signoff"]
test_case_type = "audit_meta"

[subtests.objectives]
version_contract = "Date-based version metadata matches pyproject and package API"
changelog = "Release notes mention the package version"
python_hygiene = "py_signoff has zero findings"

[subtests.approach]
pytest = "Run package-local signoff checks as normal pytest tests"

[[subtests]]
id = "L99_002"
file = "test_L99_002_design_docs.py"
name = "Design Documentation Signoff"
description = "Validate CLI design document coverage"
concerns = ["release", "signoff"]
test_case_type = "audit_meta"

[subtests.objectives]
design_index = "Master docs/design/index.html and CLI index exist"
cli_docs = "Every registered CLI command has a matching docs/design/cli HTML page"
config_contracts = "Command docs declare whether config contracts are required"

[subtests.approach]
pytest = "Inspect CLI registry and matching design documentation"

[[subtests]]
id = "L99_003"
file = "test_L99_003_quality_tools.py"
name = "Quality Tool Signoff"
description = "Run lint and type checks through Rack-owned pytest tests"
concerns = ["release", "signoff"]
test_case_type = "audit_meta"

[subtests.objectives]
ruff = "ruff check passes"
pyright = "pyright checks public source and tests"

[subtests.approach]
pytest = "Invoke quality tools as package-local pytest tests"

[[subtests]]
id = "L99_004"
file = "test_L99_004_interface_design_docs.py"
name = "Interface Design Documentation Signoff"
description = "Validate dataclass and major-interface design documentation and test ownership"
concerns = ["release", "signoff", "docs"]
test_case_type = "audit_meta"

[subtests.objectives]
dataclass_docs = "Every dataclass has a machine-readable design-doc section"
major_interface_docs = "Major public interfaces are listed with design and test requirements"
rack_test_ownership = "Each interface doc references an exercising Rack stratum and test target"

[subtests.approach]
pytest = "Inspect source AST, design HTML, Rack strata, and test files"
