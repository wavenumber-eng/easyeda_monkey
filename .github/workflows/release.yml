name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          test "easyeda-monkey/v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Verify changelog mentions package version
        shell: bash
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          grep -F "## ${VERSION}" CHANGELOG.md
      - name: Run tests
        run: uv run --extra test pytest
      - name: Run Rack smoke lane
        run: uv run --extra test rack run --all
      - name: Run signoff
        run: uv run --extra test python scripts/py_signoff.py --root . --baseline scripts/py_signoff_baseline.json
      - name: Run ruff
        run: uv run --extra test ruff check .
      - name: Run pyright
        run: uv run --extra test pyright src/py tests
      - name: Build package
        run: uv run --extra test python -m build
      - name: Check package
        run: uv run --extra test twine check dist/*
      - name: Run installed import smoke
        run: uv run --extra test python scripts/install_smoke.py
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
